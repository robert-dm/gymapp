<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2563eb">
  <title>Gym Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/api/config.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 64 64" width="64" height="64" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round">
          <rect x="8" y="24" width="8" height="16" rx="2"/><rect x="48" y="24" width="8" height="16" rx="2"/>
          <rect x="4" y="28" width="4" height="8" rx="1"/><rect x="56" y="28" width="4" height="8" rx="1"/>
          <line x1="16" y1="32" x2="48" y2="32"/>
        </svg>
      </div>
      <h1>Gym Tracker</h1>
      <p class="login-subtitle" id="login-subtitle">Sign in to track your workouts</p>
      <div id="google-signin-btn"></div>
    </div>
  </div>

  <!-- App (hidden until authenticated) -->
  <div id="app-container" class="hidden">
    <header>
      <h1 id="app-title">Gym Tracker</h1>
      <div class="header-controls">
        <button id="btn-calendar" class="btn-icon" title="Calendar">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </button>
        <button id="btn-history" class="btn-icon" title="History">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button id="btn-lang" class="btn-lang">EN</button>
        <button id="btn-user" class="btn-user" title="Account">
          <img id="user-avatar" src="" alt="" class="user-avatar">
        </button>
      </div>
    </header>

    <!-- User menu dropdown -->
    <div id="user-menu" class="user-menu hidden">
      <div class="user-menu-info">
        <img id="menu-avatar" src="" alt="" class="menu-avatar">
        <div>
          <div id="menu-name" class="menu-name"></div>
          <div id="menu-email" class="menu-email"></div>
        </div>
      </div>
      <button id="btn-logout" class="btn-logout">Sign out</button>
    </div>

    <main id="main-view">
      <div class="bodyweight-bar">
        <span id="bw-icon" class="bw-icon">&#9878;</span>
        <input type="number" id="bw-input" class="bw-input" min="0" max="500" step="0.1" placeholder="-- kg">
        <button id="bw-save" class="bw-save" title="Save">&#10003;</button>
        <span id="bw-feedback" class="bw-feedback hidden"></span>
      </div>
      <div id="category-filter" class="category-filter"></div>
      <div id="exercise-grid" class="exercise-grid"></div>
    </main>

    <!-- Exercise Detail Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <button id="modal-back" class="btn-back">&larr;</button>
          <div class="modal-title-area">
            <div id="modal-icon" class="modal-icon"></div>
            <h2 id="modal-title"></h2>
          </div>
        </div>
        <div class="modal-body">
          <button id="btn-instructions" class="btn-instructions">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span id="instructions-label">Instrucciones</span>
          </button>
          <div id="instructions-panel" class="instructions-panel hidden">
            <div id="instructions-steps" class="instructions-steps"></div>
          </div>
          <div class="modal-date-picker">
            <input type="date" id="modal-date" class="date-picker">
          </div>
          <h3 id="today-title">Hoy</h3>
          <table id="sets-table" class="sets-table">
            <thead>
              <tr>
                <th id="th-set">Serie</th>
                <th id="th-reps">Reps</th>
                <th id="th-weight">Peso (kg)</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="sets-body"></tbody>
          </table>
          <div class="add-set-row">
            <input type="number" id="input-reps" min="1" max="999" placeholder="Reps">
            <input type="number" id="input-weight" min="0" max="9999" step="0.5" placeholder="kg">
            <button type="button" id="btn-per-side" class="btn-per-side" title="Por lado / Per side">kg</button>
            <button id="btn-add-set" class="btn-primary" data-i18n="addSet">+ Serie</button>
          </div>
          <div id="per-side-total" class="per-side-total hidden"></div>
          <button id="btn-complete" class="btn-complete">&#10003; Completado</button>
          <h3 id="history-title">Historial reciente</h3>
          <div id="history-section" class="history-section"></div>
        </div>
      </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <button id="history-back" class="btn-back">&larr;</button>
          <h2 id="history-modal-title">Historial</h2>
        </div>
        <div class="modal-body">
          <input type="date" id="history-date" class="date-picker">
          <div id="history-log" class="history-log"></div>
        </div>
      </div>
    </div>
    <!-- Calendar Modal -->
    <div id="calendar-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <button id="calendar-back" class="btn-back">&larr;</button>
          <h2 id="calendar-title">Calendario</h2>
        </div>
        <div class="modal-body">
          <div class="calendar-nav">
            <button id="cal-prev" class="btn-cal-nav">&larr;</button>
            <span id="cal-month-label" class="cal-month-label"></span>
            <button id="cal-next" class="btn-cal-nav">&rarr;</button>
          </div>
          <div class="calendar-grid">
            <div class="cal-header" id="cal-header"></div>
            <div class="cal-days" id="cal-days"></div>
          </div>
          <!-- Day detail (summary + photos) -->
          <div id="cal-day-detail" class="cal-day-detail hidden">
            <h3 id="cal-day-title"></h3>
            <div id="cal-day-summary" class="cal-day-summary"></div>
            <h3 id="cal-day-photos-title"></h3>
            <div id="cal-day-photos" class="cal-day-photos"></div>
            <input type="file" id="photo-input" accept="image/*" multiple style="display:none">
            <button id="btn-upload-photo" class="btn-primary btn-upload-photo">Subir foto</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Photo Lightbox -->
    <div id="photo-lightbox" class="photo-lightbox hidden">
      <button id="lightbox-close" class="lightbox-close">&times;</button>
      <img id="lightbox-img" src="" alt="">
      <button id="lightbox-delete" class="lightbox-delete">Eliminar</button>
    </div>

  </div>

  <script src="js/i18n.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/instructions.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
